<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face {
    font-family: 'Highest';
    src: url('./Highest.ttf') format('truetype');
    font-weight: 400;
    font-style: normal;
    font-display: block;
  }
  @font-face {
    font-family: 'OpenSansEB';
    src: url('./OpenSans-ExtraBold.woff2') format('woff2'),
         url('./OpenSans-ExtraBold.ttf') format('truetype');
    font-weight: 800;
    font-style: normal;
    font-display: block;
  }
  {{FONT_FACE_CSS}}
  html, body {
    margin: 0;
    padding: 0;
    width: 1080px;
    height: 1920px;
    background: transparent;
    overflow: hidden;
  }
  .stage {
    width: 1080px;
    height: 1920px;
    position: relative;
  }
  .pill {
    position: absolute;
    bottom: {{POSITION_BOTTOM_PX}}px;
    left: 50%;
    transform: translateX(-50%);
    background: {{PILL_COLOR}};
    padding: 20px 40px;
    width: 1000px;
    box-sizing: border-box;
    text-align: center;
  }
  .hook {
    font-family: '{{FONT_FAMILY}}', 'Highest', sans-serif;
    font-weight: 400;
    font-style: normal;
    font-size: {{FONT_SIZE}}px;
    line-height: 1.0;
    letter-spacing: -4px;
    text-transform: uppercase;
    margin: 0;
    color: {{TEXT_COLOR}};
    filter:
      drop-shadow(0 2px 0 rgba(0,0,0,0.8))
      drop-shadow(0 4px 8px rgba(0,0,0,0.6));
  }
  .logo {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    width: 720px;
  }
</style>
</head>
<body>
<div class="stage">
  <div class="pill">
    <div class="hook">{{HOOK_TEXT}}</div>
  </div>
  <img class="logo" src="./logo.png" />
</div>
</body>
</html>
