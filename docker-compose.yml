services:
  clips-app:
    profiles:
      - vps-api
    build:
      context: ./server
    ports:
      - "3002:3002"
    environment:
      APP_PORT: ${APP_PORT:-3002}
      ACCESS_CODE: ${ACCESS_CODE:-changeme}
      DATABASE_URL: ${DATABASE_URL:-postgres://clips:changeme-strong@db:5432/clips}
      DATA_DIR: ${DATA_DIR:-/data}
      FRONTEND_DIST_DIR: /frontend-dist
      WORKER_SECRET: ${WORKER_SECRET:-}
    volumes:
      - clips_data:/data
      - ${FRONTEND_DIST_HOST_DIR:-/Users/mike/clips-niceatl-com/dist}:/frontend-dist:ro
    networks:
      - default
      - clips-net
    depends_on:
      - db

  worker:
    profiles:
      - vps-worker
    build:
      context: ./worker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://clips:changeme-strong@db:5432/clips}
      DATA_DIR: ${DATA_DIR:-/data}
      WHISPER_MODEL: ${WHISPER_MODEL:-medium.en}
      WORKER_POLL_MS: ${WORKER_POLL_MS:-15000}
      WORKER_SECRET: ${WORKER_SECRET:-}
      TRANSCRIBE_DISABLED: "true"
      RENDER_DISABLED: "true"
    volumes:
      - clips_data:/data
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    ports:
      - "100.127.244.92:5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-clips}
      POSTGRES_USER: ${POSTGRES_USER:-clips}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme-strong}
    volumes:
      - clips_db_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  clips_data:
  clips_db_data:

networks:
  clips-net:
    external: true
